<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Farewell 💙</title> <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet"> <style> *{ margin:0; padding:0; box-sizing:border-box; } body{ min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; background: linear-gradient(rgba(245,238,224,.92), rgba(228,214,190,.92)), url('https://www.transparenttextures.com/patterns/old-paper.png'); color:#4a3728; overflow:hidden; padding:20px; } .card{ width:min(600px,95%); padding:40px 35px; border-radius:30px; background:rgba(255,248,235,.88); backdrop-filter:blur(10px); text-align:center; border:1px solid rgba(140,110,80,.2); box-shadow: 0 15px 40px rgba(88,64,44,.18), inset 0 0 0 1px rgba(255,255,255,.4); position:relative; } .card::before{ content:""; position:absolute; inset:12px; border:1px solid rgba(140,110,80,.2); border-radius:20px; pointer-events:none; } h2{ font-family:'Great Vibes',cursive; font-size:3.3rem; color:#7b5a3d; } .message{ margin-top:20px; padding:25px; border-radius:20px; background:rgba(255,255,255,.45); border:1px solid rgba(140,110,80,.12); font-size:1.35rem; line-height:1.8; max-height:70vh; overflow:auto; } .message::-webkit-scrollbar{ width:6px; } .message::-webkit-scrollbar-thumb{ background:#9c7b54; border-radius:10px; } .btn{ margin-top:25px; padding:14px 35px; border:none; border-radius:999px; cursor:pointer; font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:700; letter-spacing:1px; color:white; background:linear-gradient(135deg,#9c7b54,#6e4f33); transition:.35s; box-shadow:0 8px 20px rgba(110,79,51,.25); } .btn:hover{ transform:translateY(-4px) scale(1.05); } .gallery{ margin-top:30px; display:grid; gap:20px; } .memory-card{ background:rgba(255,255,255,.55); border-radius:18px; padding:10px; border:1px solid rgba(140,110,80,.15); box-shadow:0 8px 20px rgba(88,64,44,.08); transition:.4s ease; } .memory-card:hover{ transform:translateY(-8px) scale(1.02); } .memory-card img{ width:100%; border-radius:14px; display:block; filter:sepia(.55) contrast(1.05); transition:.6s ease; } .memory-card img:hover{ filter:none; transform:scale(1.03); } .memory-title{ font-family:'Great Vibes',cursive; font-size:2rem; margin-top:10px; color:#7b5a3d; } .final-quote{ margin-top:40px; font-family:'Great Vibes',cursive; font-size:2.2rem; color:#7b5a3d; opacity:0; animation:fadeIn 3s forwards; } @keyframes fadeIn{ from{ opacity:0; transform:translateY(20px); } to{ opacity:1; transform:translateY(0); } } .confetti{ position:fixed; top:-20px; font-size:22px; opacity:.85; animation:fall linear forwards; } @keyframes fall{ to{ transform:translateY(110vh) rotate(360deg); } } </style> </head> <body> <main class="card"> <h2>A Special Goodbye ✨</h2> <div class="message" id="msg"> Something special is waiting 💫 </div> <button class="btn" id="start">Begin Journey</button> </main> <audio id="music" src="farewell.mp3" preload="auto"></audio> <script> const msg = document.getElementById("msg"); const start = document.getElementById("start"); const music = document.getElementById("music"); const memories = [ { url:"https://lh3.googleusercontent.com/d/148fxHSIiQyGFvA4CRGQsbhcXVQsBzG8u", title:"Great Memories Together 💙" }, { url:"https://lh3.googleusercontent.com/d/1tvt3FmmA5SCIWt09gdzIcK9gD5tST1cS", title:"Team Moments 💙" }, { url:"https://lh3.googleusercontent.com/d/1SbkcRHkMK24pssMbrPDlLIvy5Arq2wfQ", title:"Wonderful Times  ✨" }, { url:"https://lh3.googleusercontent.com/d/1XmtIolJZ8ZjmJmYHwSk6Fx8F6Jqd5q13", title:"Wonderful Times ✨" }, { url:"https://lh3.googleusercontent.com/d/1puc5LHPfkxbWiUttWrSk8imCYEU8Sx9V", title:"Wonderful Times ✨" }, { url:"https://lh3.googleusercontent.com/d/15AvbdELU2c8lpkTgqhGz0rrrcP56h1mo", title:"Wonderful Times ✨" } ]; function playMusic(){ music.play().catch(()=>{}); } function confetti(){ setInterval(()=>{ const c=document.createElement("div"); c.className="confetti"; const icons=["✨","🍂","🌸","🤎"]; c.innerText= icons[Math.floor(Math.random()*icons.length)]; c.style.left=Math.random()*100+"vw"; c.style.animationDuration= (3+Math.random()*3)+"s"; document.body.appendChild(c); setTimeout(()=>c.remove(),6000); },300); } function showGallery(){ let html='<div class="gallery">'; memories.forEach(m=>{ html+=` <div class="memory-card"> <img src="${m.url}" alt="${m.title}"> <div class="memory-title">${m.title}</div> </div> `; }); html+='</div>'; msg.innerHTML+=html; } function firstStep(){ playMusic(); msg.innerText= `It's hard to say goodbye... But working with you has been an incredible journey. Every shared laugh, every challenge, and every memory will always be cherished. 💙`; start.innerText="Continue"; start.onclick=secondStep; } function secondStep(){ msg.innerText= `Thank you for: ✨ Your support ✨ Your positivity ✨ Your kindness ✨ All the beautiful memories You truly made this place brighter.`; start.innerText="Final Message"; start.onclick=finalStep; } function finalStep(){ start.style.display="none"; msg.innerHTML= `Though paths may change,<br><br> Memories remain forever.<br><br> Wishing you endless success, happiness, and wonderful adventures ahead 🚀<br><br> Stay in touch and keep shining! ✨`; confetti(); showGallery(); setTimeout(()=>{ msg.innerHTML+=` <div class="final-quote"> "Distance may separate us,<br> but memories keep us together forever." 🤎 </div> `; },1000); } start.onclick=firstStep; </script> </body> </html>
